{% extends "base.html" %}
{% load django_bootstrap5 %}
{% load i18n %}

{% block content %}
<div class="container my-4">
    <h1 class="my-4">{% trans "Confirm deletion" %}</h1>
    <p>{% trans "Are you sure you want to delete user" %} <strong>{{ user.get_full_name }}</strong>?</p>
    
    <form action="{% url 'users:users_delete' user.id %}" method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">{% trans "Delete" %}</button>
        <a href="{% url 'users:users_list' %}" class="btn btn-secondary">{% trans "Cancel" %}</a>
    </form>
</div>
{% endblock %}
